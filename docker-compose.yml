services:
  backend:
    build: .
    container_name: incident-response-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      MODEL_NAME: openrouter/free
      DATABASE_URL: sqlite+aiosqlite:///./incident_platform.db